document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

on:relative\">\n        <div ref=\"{{ trackRef }}\" style=\"{{ viewerTrackStyle }}\">\n          <sc-for list=\"{{ viewerSlides }}\" as=\"sl\" hint-placeholder-count=\"0\">\n            <div role=\"img\" aria-label=\"Ảnh trong album\" style=\"{{ sl.style }}\">\n              <div style=\"{{ sl.noteStyle }}\">{{ sl.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;padding:12px 20px 32px;display:flex;flex-direction:column;align-items:center;gap:12px\">\n        <div style=\"font-family:'Great Vibes',cursive;font-size:26px;color:#F7F3EC\">{{ viewerName }}<\u002Fdiv>\n        <button onclick=\"{{ saveViewer }}\" style=\"background:#F7F3EC;color:#6B4A2F;border:none;border-radius:999px;padding:12px 30px;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase\" style-active=\"transform:scale(0.95)\">↓ Lưu ảnh về máy<\u002Fbutton>\n        <div style=\"font-size:13px;font-style:italic;color:rgba(247,243,236,0.55);font-family:'Cormorant Garamond',serif\">Vuốt ngang để xem ảnh khác<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;maxPhotos&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:1,&quot;max&quot;:10,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Ch\\u1ee5p \\u1ea3nh&quot;},&quot;selfTimer&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Ch\\u1ee5p \\u1ea3nh&quot;},&quot;showAlbumLink&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Album&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'welcome',   // welcome | name | capture | done | album\n    name: '',\n    photos: [],          // dataURLs, not yet sent\n    camState: 'idle',    // idle | starting | on | error\n    countdown: 0,\n    flash: false,\n    confirmOpen: false,\n    sentCount: 0,\n    sentPhotos: [],\n    album: [],\n    viewer: null,        // {src, name}\n    pending: null,       // \\u1ea3nh v\\u1eeba ch\\u1ee5p, ch\\u1edd x\\u00e1c nh\\u1eadn\n    pendingNote: '',\n    delTarget: null,\n    delMode: false,\n    delSel: {},\n    facing: 'environment',\n    pwOpen: false,\n    pwValue: '',\n    pwError: false,\n    albumAuthed: false\n  };\n\n  ALBUM_PW = '040726';\n\n  STORE_KEY = 'vbha_wedding_album_v1';\n\n  maxPhotos() {\n    const n = parseInt(this.props.maxPhotos ?? 5, 10);\n    return isNaN(n) ? 5 : Math.max(1, Math.min(10, n));\n  }\n\n  loadAlbum() {\n    try {\n      const arr = JSON.parse(localStorage.getItem(this.STORE_KEY) || '[]');\n      // chu\\u1ea9n ho\\u00e1: \\u1ea3nh c\\u0169 l\\u00e0 string, \\u1ea3nh m\\u1edbi l\\u00e0 {src, note}\n      return arr.map(e => ({\n        n: e.n, t: e.t,\n        p: (e.p || []).map(x => typeof x === 'string' ? { src: x, note: '' } : x)\n      }));\n    }\n    catch (e) { return []; }\n  }\n\n  componentDidMount() {\n    this.setState({ album: this.loadAlbum() });\n  }\n\n  componentWillUnmount() { this.stopCamera(); }\n\n  // ---------- camera ----------\n  prepVideo(el) {\n    try {\n      el.muted = true; el.autoplay = true; el.controls = false;\n      el.setAttribute('muted', '');\n      el.setAttribute('autoplay', '');\n      el.setAttribute('playsinline', '');\n      el.setAttribute('webkit-playsinline', '');\n      el.setAttribute('disablepictureinpicture', '');\n      el.setAttribute('controlslist', 'nodownload nofullscreen noremoteplayback');\n    } catch (e) {}\n  }\n\n  videoRef = (el) => {\n    this.videoEl = el;\n    if (el) {\n      this.prepVideo(el);\n      if (this.stream) {\n        el.srcObject = this.stream;\n        const p = el.play && el.play();\n        if (p && p.catch) p.catch(() => {});\n      }\n    }\n  };\n\n  trackRef = (el) => { this.trackEl = el; };\n\n  vDown = (e) => {\n    if (!this.state.viewer) return;\n    this.vStartX = e.clientX; this.vDX = 0; this.vActive = true;\n    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (x) {}\n    if (this.trackEl) this.trackEl.style.transition = 'none';\n  };\n\n  vMove = (e) => {\n    if (!this.vActive || !this.state.viewer) return;\n    const { index, list } = this.state.viewer;\n    let dx = e.clientX - this.vStartX;\n    if ((index === 0 && dx > 0) || (index === list.length - 1 && dx < 0)) dx *= 0.35;\n    this.vDX = dx;\n    if (this.trackEl) this.trackEl.style.transform = 'translateX(calc(' + (-index * 100) + '% + ' + dx + 'px))';\n  };\n\n  vUp = () => {\n    if (!this.vActive || !this.state.viewer) return;\n    this.vActive = false;\n    const { index, list } = this.state.viewer;\n    let ni = index;\n    if (this.vDX < -55 && index < list.length - 1) ni = index + 1;\n    else if (this.vDX > 55 && index > 0) ni = index - 1;\n    this.vDX = 0;\n    if (this.trackEl) {\n      this.trackEl.style.transition = 'transform .32s cubic-bezier(.22,.61,.36,1)';\n      this.trackEl.style.transform = 'translateX(' + (-ni * 100) + '%)';\n    }\n    if (ni !== index) this.setState({ viewer: { list, index: ni } });\n  };\n  async startCamera() {\n    this.stopCamera();\n    this.setState({ camState: 'starting', camMsg: '' });\n    try {\n      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { const e = new Error('no api'); e.name = 'NoApi'; throw e; }\n      let stream;\n      try {\n        stream = await navigator.mediaDevices.getUserMedia({\n          video: { facingMode: this.state.facing, width: { ideal: 1280 }, height: { ideal: 1280 } },\n          audio: false\n        });\n      } catch (e1) {\n        if (e1.name === 'NotAllowedError') throw e1;\n        // fallback: l\\u1ea5y b\\u1ea5t k\\u1ef3 camera n\\u00e0o c\\u00f3\n        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });\n      }\n      this.stream = stream;\n      if (this.videoEl) {\n        this.prepVideo(this.videoEl);\n        this.videoEl.srcObject = stream;\n        const p = this.videoEl.play && this.videoEl.play();\n        if (p && p.catch) p.catch(() => {});\n      }\n      this.setState({ camState: 'on' });\n    } catch (e) {\n      let msg = 'Cho ph\\u00e9p truy c\\u1eadp m\\u00e1y \\u1ea3nh \\u0111\\u1ec3 ch\\u1ee5p \\u1ea3nh nh\\u00e9';\n      if (e.name === 'NotReadableError') msg = 'M\\u00e1y \\u1ea3nh \\u0111ang b\\u1eadn, th\\u1eed l\\u1ea1i nh\\u00e9.';\n      this.setState({ camState: 'error', camMsg: msg });\n    }\n  }\n\n  stopCamera() {\n    if (this.stream) {\n      this.stream.getTracks().forEach(t => t.stop());\n      this.stream = null;\n    }\n    if (this.videoEl) this.videoEl.srcObject = null;\n  }\n\n  addPhoto(dataUrl) {\n    this.setState(s => s.photos.length >= this.maxPhotos() ? null : { photos: [...s.photos, dataUrl], flash: true });\n    setTimeout(() => this.setState({ flash: false }), 140);\n  }\n\n  doSnap = () => {\n    const v = this.videoEl;\n    if (!v || !v.videoWidth) {\n      // video ch\\u01b0a s\\u1eb5n s\\u00e0ng -> kh\\u1edfi \\u0111\\u1ed9ng l\\u1ea1i camera\n      this.startCamera();\n      return;\n    }\n    const scale = Math.min(1, 1000 / Math.max(v.videoWidth, v.videoHeight));\n    const c = document.createElement('canvas');\n    c.width = Math.round(v.videoWidth * scale);\n    c.height = Math.round(v.videoHeight * scale);\n    const ctx = c.getContext('2d');\n    if (this.state.facing === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }\n    ctx.drawImage(v, 0, 0, c.width, c.height);\n    this.setState({ pending: c.toDataURL('image/jpeg', 0.72), flash: true });\n    setTimeout(() => this.setState({ flash: false }), 140);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const max = this.maxPhotos();\n    const album = s.album;\n    const albumTotal = album.reduce((a, e) => a + e.p.length, 0);\n\n    const hearts = Array.from({ length: max }, (_, i) => ({\n      color: i < s.photos.length ? '#6B4A2F' : 'rgba(94,70,50,0.18)',\n      anim: i === s.photos.length - 1 ? 'heartBeat .5s ease both' : 'none'\n    }));\n\n    const openViewer = (list, index) => this.setState({ viewer: { list, index } });\n    const photoBg = (src, extra) => Object.assign({\n      backgroundColor: '#e8dfd0',\n      backgroundImage: 'url(' + src + ')',\n      backgroundSize: 'cover',\n      backgroundPosition: 'center'\n    }, extra);\n\n    const sorted = [...album].sort((a, b) => b.t - a.t);\n    const flat = [];\n    sorted.forEach(e => e.p.forEach(ph => flat.push({ src: ph.src, note: ph.note || '', name: e.n })));\n    let off = 0;\n    const albumGroups = sorted.map(e => {\n      const base = off; off += e.p.length;\n      const sel = !!s.delSel[e.t];\n      const toggle = () => {\n        if (!this.state.delMode) return;\n        this.setState(st => {\n          const ds = Object.assign({}, st.delSel);\n          if (ds[e.t]) delete ds[e.t]; else ds[e.t] = true;\n          return { delSel: ds };\n        });\n      };\n      return {\n        name: e.n,\n        count: e.p.length,\n        time: new Date(e.t).toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }),\n        toggle,\n        boxStyle: s.delMode ? {\n          padding: 10, borderRadius: 14, cursor: 'pointer',\n          transition: 'background .2s ease, border-color .2s ease',\n          border: sel ? '1.5px solid #A5553C' : '1px solid rgba(94,70,50,0.2)',\n          background: sel ? 'rgba(165,85,60,0.07)' : 'transparent'\n        } : {},\n        tickStyle: {\n          flex: 'none', width: 24, height: 24, borderRadius: '50%',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: 13, lineHeight: 1,\n          transition: 'background .2s ease',\n          border: sel ? 'none' : '1.5px solid rgba(94,70,50,0.4)',\n          background: sel ? '#A5553C' : 'transparent',\n          color: sel ? '#F7F3EC' : 'transparent'\n        },\n        photos: e.p.map((ph, j) => ({\n          style: photoBg(ph.src, { width: '100%', aspectRatio: '1', borderRadius: 10, border: '1px solid rgba(107,74,47,0.2)', cursor: 'pointer' }),\n          open: () => { if (this.state.delMode) toggle(); else openViewer(flat, base + j); }\n        }))\n      };\n    });\n\n    return {\n      // screens\n      isWelcome: s.screen === 'welcome',\n      isName: s.screen === 'name',\n      isCapture: s.screen === 'capture',\n      isDone: s.screen === 'done',\n      isAlbum: s.screen === 'album',\n\n      // welcome\n      maxPhotosVal: max,\n      showAlbum: (this.props.showAlbumLink ?? true) && true,\n      goName: () => {\n        this.setState({ screen: 'name' });\n        // xin quy\\u1ec1n camera ngay t\\u1eeb b\\u00e2y gi\\u1edd \\u0111\\u1ec3 v\\u00e0o m\\u00e0n ch\\u1ee5p l\\u00e0 d\\u00f9ng \\u0111\\u01b0\\u1ee3c lu\\u00f4n\n        this.startCamera();\n      },\n      goWelcome: () => { this.stopCamera(); this.setState({ screen: 'welcome', viewer: null, delMode: false, delSel: {}, delTarget: null }); },\n      askAlbum: () => {\n        if (s.albumAuthed) { this.stopCamera(); this.setState({ screen: 'album', album: this.loadAlbum() }); }\n        else this.setState({ pwOpen: true, pwValue: '', pwError: false });\n      },\n      pwOpen: s.pwOpen,\n      pwValue: s.pwValue,\n      pwError: s.pwError,\n      onPw: (e) => this.setState({ pwValue: e.target.value.replace(/\\D/g, ''), pwError: false }),\n      onPwKey: (e) => { if (e.key === 'Enter') this.checkPw(); },\n      submitPw: () => this.checkPw(),\n      cancelPw: () => this.setState({ pwOpen: false, pwValue: '', pwError: false }),\n\n      // name\n      name: s.name,\n      onName: (e) => this.setState({ name: e.target.value }),\n      onNameKey: (e) => { if (e.key === 'Enter' && s.name.trim()) this.goCaptureNow(); },\n      nameEmpty: !s.name.trim(),\n      nameBtnOpacity: s.name.trim() ? 1 : 0.45,\n      goCapture: () => { if (s.name.trim()) this.goCaptureNow(); },\n      backFromCapture: () => { this.stopCamera(); this.setState({ screen: 'name', countdown: 0, pending: null }); },\n\n      // capture\n      hearts,\n      photoCount: s.photos.length,\n      hasPhotos: s.photos.length > 0,\n      noPhotos: s.photos.length === 0,\n      isFull: s.photos.length >= max && !s.pending,\n      canSnap: s.photos.length < max && !s.pending,\n      pendingOn: !!s.pending,\n      pendingStyle: s.pending ? {\n        position: 'absolute', inset: 0,\n        backgroundImage: 'url(' + s.pending + ')',\n        backgroundSize: 'cover', backgroundPosition: 'center'\n      } : {},\n      retakePending: () => this.setState({ pending: null, pendingNote: '' }),\n      pendingNote: s.pendingNote,\n      onPendingNote: (e) => this.setState({ pendingNote: e.target.value }),\n      confirmPending: () => this.setState(st => {\n        if (!st.pending || st.photos.length >= max) return { pending: null, pendingNote: '' };\n        return { photos: [...st.photos, { src: st.pending, note: (st.pendingNote || '').trim() }], pending: null, pendingNote: '' };\n      }),\n      camStarting: s.camState === 'starting',\n      camOn: s.camState === 'on',\n      camError: s.camState === 'error',\n      camMsg: s.camMsg || 'Kh\\u00f4ng m\\u1edf \\u0111\\u01b0\\u1ee3c m\\u00e1y \\u1ea3nh.',\n      retryCam: () => this.startCamera(),\n      demoSnap: () => {\n        if (s.photos.length >= max) return;\n        const shades = [['#E8D8C3','#C9AE8C'],['#D8C9B4','#A8894B'],['#CBB79B','#8A6A4A'],['#E3D2BE','#B59B77'],['#D5C0A5','#96784F']];\n        const pair = shades[s.photos.length % shades.length];\n        const c = document.createElement('canvas'); c.width = 750; c.height = 1000;\n        const ctx = c.getContext('2d');\n        const g = ctx.createLinearGradient(0, 0, 0, 1000);\n        g.addColorStop(0, pair[0]); g.addColorStop(1, pair[1]);\n        ctx.fillStyle = g; ctx.fillRect(0, 0, 750, 1000);\n        ctx.fillStyle = 'rgba(107,74,47,0.9)';\n        ctx.textAlign = 'center';\n        ctx.font = '130px serif'; ctx.fillText('\\u2665', 375, 430);\n        ctx.font = 'italic 46px \"Cormorant Garamond\", serif';\n        ctx.fillText('\\u1ea2nh th\\u1eed ' + (s.photos.length + 1), 375, 560);\n        ctx.font = '30px \"Cormorant Garamond\", serif';\n        ctx.fillText(new Date().toLocaleTimeString('vi-VN'), 375, 620);\n        this.setState({ pending: c.toDataURL('image/jpeg', 0.8) });\n      },\n      countdownOn: s.countdown > 0,\n      countdown: s.countdown,\n      flashOn: s.flash,\n      videoRef: this.videoRef,\n      videoTransform: s.facing === 'user' ? 'scaleX(-1)' : 'none',\n      flipCam: () => {\n        this.setState(st => ({ facing: st.facing === 'user' ? 'environment' : 'user' }), () => this.startCamera());\n      },\n      snap: () => {\n        if (s.photos.length >= max || s.countdown > 0) return;\n        if (this.props.selfTimer) {\n          let n = 3;\n          this.setState({ countdown: n });\n          this.timer = setInterval(() => {\n            n -= 1;\n            if (n <= 0) { clearInterval(this.timer); this.setState({ countdown: 0 }); this.doSnap(); }\n            else this.setState({ countdown: n });\n          }, 1000);\n        } else this.doSnap();\n      },\n      photoItems: s.photos.map((p, i) => ({\n        style: photoBg(p.src, { width: 62, height: 62, borderRadius: 10, border: '2px solid rgba(107,74,47,0.35)', cursor: 'pointer' }),\n        view: () => openViewer(s.photos.map(p2 => ({ src: p2.src, note: p2.note || '', name: s.name.trim() || 'B\\u1ea1n' })), i),\n        remove: () => this.setState(st => ({ photos: st.photos.filter((_, j) => j !== i) }))\n      })),\n      sendBtnOpacity: s.photos.length ? 1 : 0.45,\n\n      // confirm + send\n      confirmOpen: s.confirmOpen,\n      askSend: () => { if (s.photos.length) this.setState({ confirmOpen: true }); },\n      cancelSend: () => this.setState({ confirmOpen: false }),\n      confirmSend: () => {\n        const entry = { n: s.name.trim(), t: Date.now(), p: s.photos };\n        const all = [...this.loadAlbum(), entry];\n        try { localStorage.setItem(this.STORE_KEY, JSON.stringify(all)); }\n        catch (err) { alert('B\\u1ed9 nh\\u1edb thi\\u1ebft b\\u1ecb \\u0111\\u00e3 \\u0111\\u1ea7y \\u2014 kh\\u00f4ng l\\u01b0u \\u0111\\u01b0\\u1ee3c \\u1ea3nh. H\\u00e3y li\\u00ean h\\u1ec7 c\\u00f4 d\\u00e2u ch\\u00fa r\\u1ec3 nh\\u00e9!'); }\n        this.stopCamera();\n        this.setState({ confirmOpen: false, screen: 'done', sentCount: s.photos.length, sentPhotos: s.photos, photos: [], album: all });\n      },\n\n      // done\n      sentCount: s.sentCount,\n      hasSent: s.sentPhotos.length > 0,\n      donePhotos: (() => {\n        const guest = s.name.trim() || 'B\\u1ea1n';\n        const list = s.sentPhotos.map(p => ({ src: p.src, note: p.note || '', name: guest }));\n        const rots = [-4, 3, -2, 4, -3];\n        const dys = [0, 18, 6, 22, 10];\n        return s.sentPhotos.map((p, i) => ({\n          view: () => openViewer(list, i),\n          style: {\n            width: 134, background: '#FFFDF9', padding: '8px 8px 12px',\n            borderRadius: 4, boxShadow: '0 10px 26px rgba(94,70,50,0.2)',\n            transform: 'rotate(' + rots[i % 5] + 'deg) translateY(' + dys[i % 5] + 'px)',\n            cursor: 'pointer', animation: 'popIn .4s ease ' + (i * 0.08) + 's both'\n          },\n          imgStyle: {\n            width: '100%', aspectRatio: '1', borderRadius: 2,\n            backgroundColor: '#e8dfd0',\n            backgroundImage: 'url(' + p.src + ')',\n            backgroundSize: 'cover', backgroundPosition: 'center'\n          },\n          note: p.note || '',\n          noteStyle: p.note ? {\n            fontFamily: \"'Great Vibes', cursive\", fontSize: 16,
